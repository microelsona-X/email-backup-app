<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 主渐变 -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <!-- 盾牌渐变 -->
    <linearGradient id="shieldGradient" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f0f0;stop-opacity:1" />
    </linearGradient>
    <!-- 邮件渐变 -->
    <linearGradient id="mailGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    <!-- 阴影 -->
    <filter id="shadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景圆形 -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGradient)"/>

  <!-- 盾牌主体 -->
  <path d="M256 70 C190 70 140 95 140 95 L140 250 C140 360 256 440 256 440 C256 440 372 360 372 250 L372 95 C372 95 322 70 256 70 Z"
        fill="url(#shieldGradient)" filter="url(#shadow)"/>

  <!-- 盾牌边框 -->
  <path d="M256 70 C190 70 140 95 140 95 L140 250 C140 360 256 440 256 440 C256 440 372 360 372 250 L372 95 C372 95 322 70 256 70 Z"
        fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="3"/>

  <!-- 邮件信封主体 -->
  <g filter="url(#shadow)">
    <rect x="186" y="200" width="140" height="100" rx="10" fill="url(#mailGradient)"/>

    <!-- 信封盖子背景 -->
    <path d="M186 200 L256 260 L326 200 Z" fill="rgba(255,255,255,0.2)"/>

    <!-- 信封盖子线条 -->
    <path d="M186 200 L256 260 L326 200" stroke="rgba(255,255,255,0.8)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

    <!-- 信封底部装饰线 -->
    <line x1="186" y1="300" x2="220" y2="270" stroke="rgba(255,255,255,0.4)" stroke-width="4" stroke-linecap="round"/>
    <line x1="326" y1="300" x2="292" y2="270" stroke="rgba(255,255,255,0.4)" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- 对勾徽章 -->
  <g transform="translate(350, 170)">
    <circle cx="0" cy="0" r="36" fill="#52c41a" filter="url(#shadow)"/>
    <circle cx="0" cy="0" r="36" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <path d="M-14 -2 L-6 8 L14 -14" stroke="#ffffff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
</svg>
